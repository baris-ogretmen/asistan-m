});

margin:       [10, 10, 10, 10],
filename:     `${filename.replace(/[^a-z0-9ğüşöçİĞÜŞÖÇ]/gi, '_')}.pdf`,

};

setIsDownloadingPdf(false);
}

const formatReportText = (r) => {

if (r.hayatin_icinden_odev?.length) text += `*🏠 Hayatın İçinden Görevler:*\n${r.hayatin_icinden_odev.map(i => `• ${i}`).join('\n')}\n\n`;
if (r.akademik_odev?.length) text += `*📚 Akademik Ödevler:*\n${r.akademik_odev.map(i => `• ${i}`).join('\n')}\n\n`;

return text;
};

<div className="w-full flex justify-between px-10 mt-10">
<div className="text-center font-bold text-gray-700 print-high-contrast"><div className="border-b border-gray-500 w-32 mb-1 text-center">{new Date().toLocaleDateString('tr-TR')}</div>Tarih</div>
<div className="text-center font-bold text-gray-700 print-high-contrast"><div className="border-b border-gray-500 w-32 mb-1"></div>Barış Öğretmen</div>
</div>
</div>
);

// BA-SA-RA
case 'basara_hece_tablosu':
return (
<div key={idx} className="break-inside-avoid mb-8 bg-blue-50 border-2 border-blue-200 rounded-xl p-6 print:bg-transparent text-center">
<div className="flex flex-wrap justify-center gap-4">
{blok.hece_gruplari && blok.hece_gruplari.map((hece, i) => (
<div key={i} className="bg-white border-2 border-blue-400 text-blue-800 font-black text-3xl px-6 py-4 rounded-xl shadow-md print-high-contrast">{hece}</div>
))}
</div>
</div>
);

// BINGO / TOMBALA
case 'tombala_grid':
return (
<div key={idx} className="break-inside-avoid mb-8 max-w-lg mx-auto bg-green-50 border-4 border-green-600 rounded-xl p-6 print:bg-transparent">
<div className="grid grid-cols-3 gap-2">
{blok.bingo_kareleri && blok.bingo_kareleri.map((gorev, i) => (
<div key={i} className="bg-white border-2 border-green-300 rounded-lg p-3 text-center flex flex-col justify-between aspect-square print-high-contrast">
<span className="text-xs font-bold text-gray-800 mt-2">{gorev}</span>
<div className="w-6 h-6 border-2 border-green-500 rounded-full mx-auto mt-2 flex items-center justify-center text-white print-high-contrast"></div>
</div>
))}
</div>
</div>
);

// GÖRSEL DİKTE EMOJİLER
case 'gorsel_dikte':
return (
<div key={idx} className="break-inside-avoid mb-8">
<div className="grid grid-cols-2 md:grid-cols-3 gap-8">
{blok.dikte_kelimeleri && blok.dikte_kelimeleri.map((item, i) => (
<div key={i} className="flex flex-col items-center justify-end h-40 bg-gray-50 border border-gray-200 rounded-2xl p-4 print:bg-transparent">
<div className="text-6xl sm:text-7xl mb-auto">{item.emoji}</div>
<div className="w-full border-b-4 border-dashed border-gray-400 mt-6 relative"></div>
</div>
))}
</div>
</div>
);

// DİĞER STANDART BLOKLAR İÇİN FALLBACK (Zihin Haritası, Makine, Tablo vb.)
default: return (
<div key={idx} className="mb-4 text-gray-800 print-high-contrast whitespace-pre-wrap">{blok.icerik_metni || blok.soru_metni || "Lütfen farklı bir şablon deneyin."}</div>
);
}
})}
</div>

{/* ÖĞRETMEN NÜSHASI - AYRI SAYFA VE RENKLİ ANALİZLER */}
{showAnswerKey && materialResult.icerik_bloklari.some(b => b.cevap_anahtari) && (
  <div className="page-break-before mt-16 pt-10 border-t-8 border-double border-indigo-500">
    <div className="text-center mb-10">
      <h3 className="text-3xl font-black text-indigo-900 uppercase tracking-tighter print-high-contrast">
        <i className="fa-solid fa-graduation-cap mr-3 text-yellow-500"></i> 
        ÖĞRETMEN NÜSHASI & DETAYLI ÇÖZÜMLER
      </h3>
      <p className="text-gray-500 font-bold italic mt-2">Bu sayfa sadece öğretmen kullanımı içindir. Çözümler pedagojik olarak adım adım analiz edilmiştir.</p>
    </div>

    <div className="grid grid-cols-1 gap-6">
      {materialResult.icerik_bloklari.map((blok, idx) => {
        if (!blok.cevap_anahtari) return null;
        return (
        <div key={idx} className="bg-indigo-50 border-2 border-indigo-200 p-6 rounded-3xl shadow-sm break-inside-avoid relative overflow-hidden">
          <div className="absolute top-0 right-0 bg-indigo-600 text-white px-4 py-1 rounded-bl-2xl font-black text-xs print-high-contrast">
            BLOK {idx + 1}
          </div>
          <div className="flex items-center mb-4">
            <div className="w-12 h-12 bg-white rounded-2xl flex items-center justify-center shadow-sm mr-4 border border-indigo-200">
                <i className="fa-solid fa-lightbulb text-yellow-500 text-xl"></i>
            </div>
            <h4 className="font-extrabold text-indigo-900 text-lg uppercase print-high-contrast">Çözüm ve Uygulama Notu</h4>
          </div>
          <div className="bg-white p-4 rounded-2xl border border-dashed border-indigo-300 text-gray-800 font-bold leading-relaxed print-high-contrast whitespace-pre-wrap">
            {blok.cevap_anahtari}
          </div>
        </div>
      )})}
    </div>
  </div>
)}

<div className="mt-10 border-t border-gray-200 pt-5">
<BrandFooter />
</div>
</div>
</div>
)}
</div>
)}

{/* 5. NOTLAR SEKMESİ */}
{activeTab === 'notepad' && (
<div className="animate-fade-in no-print pb-20 space-y-6">
<div className="text-center mb-6">
<h2 className="text-3xl font-extrabold text-gray-800"><i className="fa-solid fa-book-journal-whills text-indigo-600 mr-3"></i>Dijital Not Defterim</h2>
</div>
<div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
<div className="bg-white rounded-2xl shadow-sm border border-gray-200 p-6 lg:col-span-2">
<div className="flex justify-between items-center mb-4 border-b pb-2">
<h3 className="text-lg font-bold text-gray-800"><i className="fa-solid fa-pen-to-square text-indigo-500 mr-2"></i>Yeni Not Oluştur</h3>
<input type="date" value={noteDate} onChange={e=>setNoteDate(e.target.value)} className="px-2 py-1 bg-gray-50 border rounded outline-none text-sm"/>
</div>
<div className="space-y-4">
<input type="text" value={noteTitle} onChange={e=>setNoteTitle(e.target.value)} placeholder="Not Başlığı..." className="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl outline-none font-bold text-gray-800 focus:ring-2 focus:ring-indigo-500 transition" />
<textarea value={noteContent} onChange={e=>setNoteContent(e.target.value)} rows="8" placeholder="Buraya yazın..." className="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl outline-none text-gray-700 resize-y focus:ring-2 focus:ring-indigo-500 transition"></textarea>
<button onClick={saveNote} className="w-full bg-gray-900 text-white py-3 rounded-xl font-bold hover:bg-black transition shadow-md"><i className="fa-solid fa-floppy-disk mr-2"></i> Notu Kaydet</button>
</div>
</div>
<div className="bg-white rounded-2xl shadow-sm border border-gray-200 p-6">
<h3 className="text-lg font-bold text-gray-800 mb-4 border-b pb-2"><i className="fa-solid fa-list text-indigo-500 mr-2"></i>Geçmiş Notlar ({notes.length})</h3>
<div className="space-y-3 overflow-y-auto max-h-[500px] pr-2">
{notes.length === 0 ? <p className="text-gray-400 text-sm text-center py-4">Kayıtlı notunuz yok.</p> :
notes.map(n => (
<div key={n.id} className="bg-gray-50 p-4 rounded-xl border border-gray-100 hover:border-indigo-200 transition group relative">
<div className="flex justify-between items-start mb-2">
<h4 className="font-bold text-gray-800 text-sm">{n.title}</h4>
<button onClick={() => deleteNote(n.id)} className="text-gray-400 hover:text-red-500 opacity-0 group-hover:opacity-100 transition"><i className="fa-solid fa-trash"></i></button>
</div>
<p className="text-xs text-gray-600 line-clamp-3 mb-3 whitespace-pre-wrap">{n.content}</p>
<div className="flex justify-between items-center border-t pt-2 border-gray-200">
<span className="text-[10px] font-bold text-indigo-500 bg-indigo-50 px-2 py-1 rounded"><i className="fa-regular fa-calendar mr-1"></i> {n.date.split('-').reverse().join('.')}</span>
<button onClick={() => {setNoteTitle(n.title); setNoteContent(n.content); setNoteDate(n.date);}} className="text-[10px] text-indigo-600 hover:underline font-bold">Düzenle</button>
</div>
</div>
))
}
</div>
</div>
</div>
</div>
)}

{/* 6. AYARLAR SEKMESİ */}
{activeTab === 'settings' && (
<div className="max-w-2xl mx-auto bg-white rounded-2xl shadow-sm border border-gray-200 p-6 md:p-8 animate-fade-in no-print">
<div className="flex items-center justify-between mb-6">
<h2 className="text-2xl font-bold text-gray-800"><i className="fa-solid fa-gear text-indigo-600 mr-3"></i>Ayarlar</h2>
<div className="flex items-center space-x-2 text-sm">
<span className={`w-3 h-3 rounded-full ${isFbReady ? 'bg-green-500' : 'bg-red-500'}`}></span>
<span className="font-medium text-gray-600">{isFbReady ? 'Veritabanı Aktif' : 'Bağlanıyor...'}</span>
</div>
</div>
<div className="space-y-6">
<div>
<label className="block text-sm font-bold text-gray-700 mb-2">Gemini API Anahtarı</label>
<input type="password" value={apiKey} onChange={(e) => setApiKey(e.target.value)} placeholder="AIzaSy..." className="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 font-mono text-sm" />
<p className="text-xs text-gray-500 mt-1">API anahtarınız tarayıcınızda şifrelenerek yerel olarak saklanır.</p>
</div>
<div>
<label className="block text-sm font-bold text-gray-700 mb-2">Model Seçimi (Manuel Giriş)</label>
<input type="text" value={modelName} onChange={(e) => setModelName(e.target.value)} placeholder="örn: gemini-2.5-pro" className="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 font-mono text-sm" />
<div className="flex gap-2 mt-2">
<button onClick={() => setModelName('gemini-2.0-pro')} className="text-xs bg-indigo-50 text-indigo-600 px-3 py-1.5 rounded-lg font-bold hover:bg-indigo-100 transition shadow-sm">Gemini 2.0 Pro</button>
<button onClick={() => setModelName('gemini-2.0-flash')} className="text-xs bg-indigo-50 text-indigo-600 px-3 py-1.5 rounded-lg font-bold hover:bg-indigo-100 transition shadow-sm">Gemini 2.0 Flash</button>
<button onClick={() => setModelName('gemini-2.5-pro')} className="text-xs bg-indigo-50 text-indigo-600 px-3 py-1.5 rounded-lg font-bold hover:bg-indigo-100 transition shadow-sm">Gemini 2.5 Pro</button>
</div>
</div>
<div className="pt-4 border-t">
<button onClick={() => {localStorage.clear(); window.location.reload();}} className="w-full bg-red-100 text-red-700 py-3 rounded-xl font-bold hover:bg-red-200 transition flex items-center justify-center shadow-md">
<i className="fa-solid fa-trash-can mr-2"></i> Tüm Verileri Sıfırla
</button>
</div>
</div>
</div>
)}

</main>

<nav className="md:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 z-50 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] no-print overflow-x-auto">
<div className="flex justify-around items-center h-16 min-w-[320px] px-2">
<button onClick={() => {setActiveTab('new_report'); setEditingReportId(null); setEditableResult(null);}} className={`flex flex-col items-center justify-center w-full h-full space-y-1 transition ${activeTab === 'new_report' ? 'text-indigo-600 scale-110' : 'text-gray-400'}`}><i className="fa-solid fa-pen-nib text-lg"></i><span className="text-[10px] font-bold">Rapor</span></button>
<button onClick={() => setActiveTab('contacts')} className={`flex flex-col items-center justify-center w-full h-full space-y-1 transition ${activeTab === 'contacts' ? 'text-indigo-600 scale-110' : 'text-gray-400'}`}><i className="fa-solid fa-address-book text-lg"></i><span className="text-[10px] font-bold">Rehber</span></button>
<button onClick={() => setActiveTab('archive')} className={`flex flex-col items-center justify-center w-full h-full space-y-1 transition ${activeTab === 'archive' ? 'text-indigo-600 scale-110' : 'text-gray-400'}`}><i className="fa-solid fa-users-viewfinder text-lg"></i><span className="text-[10px] font-bold">Arşiv</span></button>
<button onClick={() => setActiveTab('tools')} className={`flex flex-col items-center justify-center w-full h-full space-y-1 transition ${activeTab === 'tools' ? 'text-indigo-600 scale-110' : 'text-gray-400'}`}><i className="fa-solid fa-wand-magic-sparkles text-lg"></i><span className="text-[10px] font-bold">Matbaa</span></button>
<button onClick={() => setActiveTab('notepad')} className={`flex flex-col items-center justify-center w-full h-full space-y-1 transition ${activeTab === 'notepad' ? 'text-indigo-600 scale-110' : 'text-gray-400'}`}><i className="fa-solid fa-book text-lg"></i><span className="text-[10px] font-bold">Notlar</span></button>
</div>
</nav>

</div>
);
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
