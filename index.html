    <!-- Firebase Modules -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        window.FirebaseSDK = {

            getFirestore, collection, onSnapshot, addDoc, doc, deleteDoc, updateDoc

        window.dispatchEvent(new Event('firebase-sdk-ready'));
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; color: #1f2937; -webkit-tap-highlight-color: transparent; }
        .textarea-auto { display: block; width: 100%; overflow: hidden; resize: none; min-height: 40px; line-height: 1.5; }

        /* YAZDIRMA MOTORU - Kesin Okunabilirlik, Yüksek Kontrast ve Marka Footer */

            body { background-color: white !important; color: black !important; margin: 0; padding: 0; }

            .print-only { display: block !important; }

            .print-container { box-shadow: none !important; padding: 0 !important; margin: 0 !important; border: none !important; }
            .print-card { border: 1px solid #d1d5db !important; box-shadow: none !important; break-inside: avoid; margin-bottom: 1rem !important; page-break-inside: avoid; }

            textarea, input { border: none !important; background: transparent !important; resize: none !important; padding: 0 !important; box-shadow: none !important; color: #000000 !important; outline: none !important; font-weight: 700 !important; }
            
            @page { margin: 1cm; }
            h1, h2, h3, h4, h5 { page-break-after: avoid; }
            .break-inside-avoid { break-inside: avoid; page-break-inside: avoid; }
            .page-break-before { page-break-before: always !important; break-before: page !important; }
            
            .brand-footer { display: block !important; width: 100%; text-align: center; margin-top: 40px; padding-top: 15px; border-top: 3px solid #000; font-size: 14px; font-weight: 900; color: #000; break-inside: avoid; }

        @media screen { .print-only { display: none !important; } .brand-footer { display: none !important; } }

</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const CATEGORIES = [
            { id: 'okul_oncesi', name: 'Özel Eğitim & Okul Öncesi', icon: 'fa-child', color: 'bg-blue-50 text-blue-700 border-blue-200 hover:bg-blue-100', activeColor: 'bg-blue-600 text-white border-blue-600', reportTitle: 'Özel Eğitim Seans Raporu' },
            { id: 'dil_konusma', name: 'Dil ve Konuşma Terapisi', icon: 'fa-comments', color: 'bg-pink-50 text-pink-700 border-pink-200 hover:bg-pink-100', activeColor: 'bg-pink-600 text-white border-pink-600', reportTitle: 'Dil ve Konuşma Terapisi Raporu' },
            { id: 'ilkokul', name: 'İlkokul (Temel Beceriler)', icon: 'fa-school', color: 'bg-green-50 text-green-700 border-green-200 hover:bg-green-100', activeColor: 'bg-green-600 text-white border-green-600', reportTitle: 'İlkokul Gelişim Raporu' },
            { id: 'ortaokul', name: 'Ortaokul & LGS Hazırlık', icon: 'fa-book-open', color: 'bg-orange-50 text-orange-700 border-orange-200 hover:bg-orange-100', activeColor: 'bg-orange-600 text-white border-orange-600', reportTitle: 'LGS Koçluk Raporu' },
            { id: 'lise', name: 'Lise & YKS (TYT/AYT)', icon: 'fa-graduation-cap', color: 'bg-red-50 text-red-700 border-red-200 hover:bg-red-100', activeColor: 'bg-red-600 text-white border-red-600', reportTitle: 'YKS İlerleme Raporu' },
            { id: 'kpss', name: 'KPSS, EKPSS & Yetişkin', icon: 'fa-landmark', color: 'bg-teal-50 text-teal-700 border-teal-200 hover:bg-teal-100', activeColor: 'bg-teal-600 text-white border-teal-600', reportTitle: 'Akademik Gelişim Raporu' },
            { id: 'teknoloji', name: 'Robotik, Kodlama & Yapay Zeka', icon: 'fa-robot', color: 'bg-purple-50 text-purple-700 border-purple-200 hover:bg-purple-100', activeColor: 'bg-purple-600 text-white border-purple-600', reportTitle: 'Teknoloji & Bilişim Raporu' },
            { id: 'satranc', name: 'Satranç & Akıl Zeka Oyunları', icon: 'fa-chess-knight', color: 'bg-yellow-50 text-yellow-700 border-yellow-200 hover:bg-yellow-100', activeColor: 'bg-yellow-600 text-white border-yellow-600', reportTitle: 'Zihinsel Gelişim & Strateji Raporu' }
        ];

        const COLOR_MAP = {
            blue: 'bg-blue-100 border-blue-400 text-blue-900', green: 'bg-green-100 border-green-400 text-green-900',
            purple: 'bg-purple-100 border-purple-400 text-purple-900', orange: 'bg-orange-100 border-orange-400 text-orange-900',
            rose: 'bg-rose-100 border-rose-400 text-rose-900', yellow: 'bg-yellow-100 border-yellow-400 text-yellow-900',
            teal: 'bg-teal-100 border-teal-400 text-teal-900'
        };

        const AutoResizeTextarea = ({ value, onChange, className, placeholder }) => {
            const textareaRef = useRef(null);
            useEffect(() => {
                if (textareaRef.current) {
                    textareaRef.current.style.height = 'auto';
                    textareaRef.current.style.height = textareaRef.current.scrollHeight + 'px';
                }
            }, [value]);
            return <textarea ref={textareaRef} value={value} onChange={onChange} placeholder={placeholder} className={`textarea-auto w-full bg-transparent border border-transparent hover:border-gray-200 focus:border-indigo-500 focus:bg-white focus:ring-2 focus:ring-indigo-100 rounded p-1 transition-all ${className}`} />;
        };

        const BrandFooter = () => (
            <div className="brand-footer print-only">
                <i className="fa-solid fa-graduation-cap mr-2"></i> BARIŞ ÖĞRETMEN EĞİTİM & GELİŞİM DÖKÜMANI <br/>
                <span style={{fontSize: '12px', fontWeight: 'bold', marginTop: '5px', display: 'inline-block', color: '#000'}}>🌐 https://baris-ogretmen.github.io/site-1/</span>
            </div>
        );

        const App = () => {
            // --- GENERAL STATES ---
            const [activeTab, setActiveTab] = useState('new_report'); 
            const [apiKey, setApiKey] = useState(localStorage.getItem('gemini_api_key') || '');
            const [modelName, setModelName] = useState(localStorage.getItem('gemini_model_name') || 'gemini-2.5-flash');
            const [toastMessage, setToastMessage] = useState('');
            const [isDownloadingPdf, setIsDownloadingPdf] = useState(false);
            
            // --- FIREBASE STATES ---
            const [db, setDb] = useState(null);
            const [user, setUser] = useState(null);
            const [appId, setAppId] = useState('baris-ogretmen-app');
            const [isFbReady, setIsFbReady] = useState(false);
            const [savedReports, setSavedReports] = useState([]);
            const [contacts, setContacts] = useState([]);
            const [notes, setNotes] = useState([]);

            // --- REPORT STATES ---
            const [editingReportId, setEditingReportId] = useState(null);
            const [studentName, setStudentName] = useState('');
            const [parentName, setParentName] = useState('');
            const [parentPhone, setParentPhone] = useState('');
            const [date, setDate] = useState(new Date().toISOString().split('T')[0]);
            const [category, setCategory] = useState(CATEGORIES[0].name);
            const [observation, setObservation] = useState('');
            const [editableResult, setEditableResult] = useState(null);
            const [loading, setLoading] = useState(false);
            const [isExpanding, setIsExpanding] = useState(false);
            
            // --- ARCHIVE STATES ---
            const [searchQuery, setSearchQuery] = useState('');
            const [selectedStudent, setSelectedStudent] = useState(null);
            const [isAnalyzing, setIsAnalyzing] = useState(false);
            const [aiAnalysisResult, setAiAnalysisResult] = useState(null);

            // --- CRM & BULK STATES ---
            const [newContact, setNewContact] = useState({ studentName: '', parentName: '', phone: '', group: '' });
            const [bulkGroup, setBulkGroup] = useState('');
            const [bulkMessageTemplate, setBulkMessageTemplate] = useState('');
            const [bulkMessages, setBulkMessages] = useState([]);
            const [isGeneratingBulk, setIsGeneratingBulk] = useState(false);

            // --- TOOLS (MATBAA & AI) STATES ---
            const [activityCategory, setActivityCategory] = useState(CATEGORIES[0].name);
            
            // Matbaa
            const [materialTopic, setMaterialTopic] = useState('');
            const [materialType, setMaterialType] = useState('okuma_parcasi'); // Default okuma parçası
            const [materialResult, setMaterialResult] = useState(null);
            const [isGeneratingMaterial, setIsGeneratingMaterial] = useState(false);
            const [matStudentName, setMatStudentName] = useState('');
            const [matInterests, setMatInterests] = useState('');
            const [matDifficulty, setMatDifficulty] = useState('Orta Seviye'); 
            const [matQuestionCount, setMatQuestionCount] = useState(10);
            const [showAnswerKey, setShowAnswerKey] = useState(true); 

            // AI Tools (Diğer Asistanlar)
            const [parentMessage, setParentMessage] = useState('');
            const [selectedStudentForMsg, setSelectedStudentForMsg] = useState('');
            const [parentReply, setParentReply] = useState('');
            const [isGeneratingReply, setIsGeneratingReply] = useState(false);
            
            const [activityTopic, setActivityTopic] = useState('');
            const [activityResult, setActivityResult] = useState(null);
            const [isGeneratingActivity, setIsGeneratingActivity] = useState(false);
            
            const [behaviorIssue, setBehaviorIssue] = useState('');
            const [behaviorResult, setBehaviorResult] = useState(null);
            const [isGeneratingBehavior, setIsGeneratingBehavior] = useState(false);

            const [complexText, setComplexText] = useState('');
            const [simplifiedResult, setSimplifiedResult] = useState(null);
            const [isGeneratingSimplification, setIsGeneratingSimplification] = useState(false);

            const [targetSkill, setTargetSkill] = useState('');
            const [studentCurrentLevel, setStudentCurrentLevel] = useState('');
            const [bepResult, setBepResult] = useState(null);
            const [isGeneratingBep, setIsGeneratingBep] = useState(false);

            const [graderQuestion, setGraderQuestion] = useState('');
            const [graderAnswer, setGraderAnswer] = useState('');
            const [graderResult, setGraderResult] = useState(null);
            const [isGeneratingGrader, setIsGeneratingGrader] = useState(false);

            const [projectTopic, setProjectTopic] = useState('');
            const [projectResult, setProjectResult] = useState(null);
            const [isGeneratingProject, setIsGeneratingProject] = useState(false);

            const [lessonTopic, setLessonTopic] = useState('');
            const [lessonResult, setLessonResult] = useState(null);
            const [isGeneratingLesson, setIsGeneratingLesson] = useState(false);

            const [storyTheme, setStoryTheme] = useState('');
            const [storyResult, setStoryResult] = useState(null);
            const [isGeneratingStory, setIsGeneratingStory] = useState(false);

            const [rubricTopic, setRubricTopic] = useState('');
            const [rubricResult, setRubricResult] = useState(null);
            const [isGeneratingRubric, setIsGeneratingRubric] = useState(false);

            const [newsletterTopics, setNewsletterTopics] = useState('');
            const [newsletterResult, setNewsletterResult] = useState(null);
            const [isGeneratingNewsletter, setIsGeneratingNewsletter] = useState(false);

            const [pickedStudent, setPickedStudent] = useState(null);

            // --- NOTEPAD STATES ---
            const [noteTitle, setNoteTitle] = useState('');
            const [noteContent, setNoteContent] = useState('');
            const [noteDate, setNoteDate] = useState(new Date().toISOString().split('T')[0]);

            // --- TIMER STATES ---
            const [timerActive, setTimerActive] = useState(false);
            const [timeLeft, setTimeLeft] = useState(2400);

            // Settings effect
            useEffect(() => {
                if (apiKey) localStorage.setItem('gemini_api_key', apiKey);
                if (modelName) localStorage.setItem('gemini_model_name', modelName);
            }, [apiKey, modelName]);

            // Timer effect
            useEffect(() => {
                let interval = null;
                if (timerActive && timeLeft > 0) {
                    interval = setInterval(() => setTimeLeft(t => t - 1), 1000);
                } else if (timeLeft === 0 && timerActive) {
                    setTimerActive(false);
                    showToast("⏳ Ders Süresi Bitti!");
                    const audio = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3');
                    audio.play().catch(e=>console.log(e));
                }
                return () => clearInterval(interval);
            }, [timerActive, timeLeft]);

            const formatTime = (seconds) => {
                const m = Math.floor(seconds / 60).toString().padStart(2, '0');
                const s = (seconds % 60).toString().padStart(2, '0');
                return `${m}:${s}`;
            };

            // --- FIREBASE INIT & SYNC ---
            useEffect(() => {
                const setupFirebase = async () => {
                    try {
                        const { initializeApp, getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged, getFirestore } = window.FirebaseSDK;
                        const finalConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
                            apiKey: "AIzaSyAqeO-yQyQPnLsOqKmSNvVH23WPvneIjaU",
                            authDomain: "shaped-totem-481514-c5.firebaseapp.com",
                            projectId: "shaped-totem-481514-c5",
                            storageBucket: "shaped-totem-481514-c5.firebasestorage.app",
                            messagingSenderId: "519295049418",
                            appId: "1:519295049418:web:7d04e18c4ea36bc088de33"
                        };
                        if (typeof __app_id !== 'undefined') setAppId(__app_id);
                        const app = initializeApp(finalConfig);
                        const auth = getAuth(app);
                        const firestore = getFirestore(app);
                        setDb(firestore);

                        if (typeof __firebase_config === 'undefined' && typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                        onAuthStateChanged(auth, (u) => { setUser(u); setIsFbReady(true); });
                    } catch (err) { showToast("Veritabanı bağlantısı kurulamadı."); }
                };
                
                if (window.FirebaseSDK) setupFirebase();
                else {
                    const listener = () => setupFirebase();
                    window.addEventListener('firebase-sdk-ready', listener);
                    return () => window.removeEventListener('firebase-sdk-ready', listener);
                }
            }, []);

            useEffect(() => {
                if (!isFbReady || !user || !db) return;
                const { collection, onSnapshot } = window.FirebaseSDK;
                
                const unsubReports = onSnapshot(collection(db, 'artifacts', appId, 'users', user.uid, 'reports'), (snapshot) => {
                    const reps = []; snapshot.forEach((doc) => reps.push({ id: doc.id, ...doc.data() }));
                    reps.sort((a, b) => new Date(b.date) - new Date(a.date));
                    setSavedReports(reps);
                });
                const unsubContacts = onSnapshot(collection(db, 'artifacts', appId, 'users', user.uid, 'contacts'), (snapshot) => {
                    const conts = []; snapshot.forEach((doc) => conts.push({ id: doc.id, ...doc.data() }));
                    setContacts(conts);
                });
                const unsubNotes = onSnapshot(collection(db, 'artifacts', appId, 'users', user.uid, 'notes'), (snapshot) => {
                    const nts = []; snapshot.forEach((doc) => nts.push({ id: doc.id, ...doc.data() }));
                    nts.sort((a, b) => new Date(b.date) - new Date(a.date));
                    setNotes(nts);
                });

                return () => { unsubReports(); unsubContacts(); unsubNotes(); };
            }, [isFbReady, user, db, appId]);

            const showToast = (msg) => { setToastMessage(msg); setTimeout(() => setToastMessage(''), 4000); };

            const handleApiError = (err) => {
                console.error(err);
                if (err.message && err.message.includes('429')) {
                    showToast("🛑 API limitine ulaştınız. Lütfen 1 dakika bekleyip tekrar deneyin.");
                } else {
                    showToast("❌ Yapay zeka iletişim hatası. Lütfen API anahtarınızı kontrol edin.");
                }
            };

            const handlePrint = () => {
                showToast("🖨️ Yazdırılıyor...");
                setTimeout(() => window.print(), 300);
            };

            // KUSURSUZ PDF İNDİRME
            const downloadAsPDF = async (elementId, filename) => {
                const element = document.getElementById(elementId);
                if (!element) return;
                
                setIsDownloadingPdf(true);
                showToast("PDF hazırlanıyor, lütfen bekleyin...");

                const noPrintElements = element.querySelectorAll('.no-print');
                noPrintElements.forEach(el => el.style.display = 'none');

                const printOnlyElements = element.querySelectorAll('.print-only');
                printOnlyElements.forEach(el => {
                    el.classList.remove('print-only');
                    el.setAttribute('data-pdf-restored', 'true');
                });

                const opt = {
                    margin:       [10, 10, 10, 10],
                    filename:     `${filename.replace(/[^a-z0-9ğüşöçİĞÜŞÖÇ]/gi, '_')}.pdf`,
                    image:        { type: 'jpeg', quality: 0.98 },
                    html2canvas:  { scale: 2, useCORS: true, letterRendering: true, backgroundColor: '#ffffff', scrollY: 0 },
                    jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' },
                    pagebreak:    { mode: ['avoid-all', 'css', 'legacy'] }
                };

                try {
                    await html2pdf().set(opt).from(element).save();
                    showToast("PDF başarıyla cihazınıza indirildi! 📥");
                } catch(e) {
                    showToast("PDF oluşturulurken bir hata oluştu.");
                } finally {
                    noPrintElements.forEach(el => el.style.display = '');
                    const restoredElements = element.querySelectorAll('[data-pdf-restored="true"]');
                    restoredElements.forEach(el => {
                        el.classList.add('print-only');
                        el.removeAttribute('data-pdf-restored');
                    });
                    setIsDownloadingPdf(false);
                }
            };

            // --- COMPUTED DATA ---
            const groupedStudents = useMemo(() => {
                const groups = {};
                savedReports.forEach(r => {
                    const name = r.studentName.toUpperCase();
                    if (!groups[name]) groups[name] = [];
                    groups[name].push(r);
                });
                return groups;
            }, [savedReports]);
            const uniqueGroups = useMemo(() => [...new Set(contacts.map(c => c.group).filter(Boolean))], [contacts]);
            const filteredStudents = Object.keys(groupedStudents).filter(name => name.includes(searchQuery.toUpperCase()));

            // --- CRM / REHBER FONKSİYONLARI ---
            const handleContactSelect = (e) => {
                const selectedId = e.target.value;
                if (!selectedId) return;
                const contact = contacts.find(c => c.id === selectedId);
                if (contact) { setStudentName(contact.studentName); setParentName(contact.parentName); setParentPhone(contact.phone); }
            };
            const addContact = async () => {
                if (!newContact.studentName || !newContact.parentName) { showToast("Öğrenci ve Veli adı zorunludur!"); return; }
                if (!isFbReady || !user || !db) return;
                try {
                    await window.FirebaseSDK.addDoc(window.FirebaseSDK.collection(db, 'artifacts', appId, 'users', user.uid, 'contacts'), newContact);
                    showToast("Kişi rehbere eklendi!");
                    setNewContact({ studentName: '', parentName: '', phone: '', group: '' });
                } catch (err) { showToast("Kişi eklenirken hata oluştu."); }
            };
            const deleteContact = async (id) => {
                if (!isFbReady || !user || !db || !window.confirm("Bu kişiyi silmek istediğinize emin misiniz?")) return;
                try {
                    await window.FirebaseSDK.deleteDoc(window.FirebaseSDK.doc(db, 'artifacts', appId, 'users', user.uid, 'contacts', id));
                    showToast("Kişi silindi.");
                } catch (err) { showToast("Silme başarısız."); }
            };

            // --- ARŞİV FONKSİYONLARI ---
            const deleteReport = async (id) => {
                if (!isFbReady || !user || !db || !window.confirm("Bu raporu arşivden kalıcı olarak silmek istediğinize emin misiniz?")) return;
                try {
                    await window.FirebaseSDK.deleteDoc(window.FirebaseSDK.doc(db, 'artifacts', appId, 'users', user.uid, 'reports', id));
                    showToast("Rapor başarıyla silindi. 🗑️");
                } catch (err) { showToast("Rapor silinemedi."); }
            };

            const editReport = (report) => {
                setEditingReportId(report.id);
                setStudentName(report.studentName);
                setParentName(report.parentName || '');
                setParentPhone(report.parentPhone || '');
                setDate(report.date);
                setCategory(report.category);
                setObservation(report.observation);
                setEditableResult(report.result);
                setActiveTab('new_report');
                showToast("Düzenleme modundasınız. Kaydettiğinizde eski rapor güncellenir.");
            };

            const toggleHomeworkStatus = async (reportId, currentStatus) => {
                if (!isFbReady || !user || !db) return;
                try {
                    const reportRef = window.FirebaseSDK.doc(db, 'artifacts', appId, 'users', user.uid, 'reports', reportId);
                    await window.FirebaseSDK.updateDoc(reportRef, { homeworkCompleted: !currentStatus });
                    showToast(currentStatus ? "Ödev tamamlanmadı olarak işaretlendi." : "Harika! Ödev yapıldı olarak işaretlendi. ✅");
                } catch(e) { showToast("Ödev durumu güncellenemedi."); }
            };

            const saveNote = async () => {
                if (!isFbReady || !user || !db) return;
                if (!noteTitle.trim() || !noteContent.trim()) { showToast("Başlık ve içerik boş olamaz."); return; }
                try {
                    await window.FirebaseSDK.addDoc(window.FirebaseSDK.collection(db, 'artifacts', appId, 'users', user.uid, 'notes'), {
                        title: noteTitle, content: noteContent, date: noteDate, timestamp: new Date().toISOString()
                    });
                    showToast("Not başarıyla kaydedildi!");
                    setNoteTitle(''); setNoteContent('');
                } catch (err) { showToast("Not kaydedilemedi."); }
            };
            const deleteNote = async (id) => {

                            <div className="animate-fade-in no-print pb-20 space-y-6">
                                <div className="text-center mb-6">
                                    <h2 className="text-3xl font-extrabold text-gray-800"><i className="fa-solid fa-book-journal-whills text-indigo-600 mr-3"></i>Dijital Not Defterim</h2>
                                    <p className="text-gray-500 mt-2">Günlük öğrenci takibi, teslim edilen dosyalar ve kişisel notlarınız.</p>
                                </div>

                                <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                                    <div className="bg-white rounded-2xl shadow-sm border border-gray-200 p-6 lg:col-span-2">
                                        <div className="flex justify-between items-center mb-4 border-b pb-2">
                                            <h3 className="text-lg font-bold text-gray-800"><i className="fa-solid fa-pen-to-square text-indigo-500 mr-2"></i>Yeni Not Oluştur</h3>
                                            <input type="date" value={noteDate} onChange={e=>setNoteDate(e.target.value)} className="px-2 py-1 bg-gray-50 border rounded outline-none text-sm font-medium text-gray-600"/>
                                        </div>
                                        
                                        <div className="mb-4 flex gap-2 overflow-x-auto pb-2">
                                            <span className="text-xs font-bold text-gray-500 self-center">Şablonlar:</span>
                                            <button onClick={() => {setNoteTitle('Derse Aldığım Öğrenciler'); setNoteContent('- Öğrenci 1:\n- Öğrenci 2:\n- Gözlem: ');}} className="text-xs bg-indigo-50 text-indigo-700 border border-indigo-200 px-3 py-1.5 rounded-lg hover:bg-indigo-100 whitespace-nowrap"><i className="fa-solid fa-users mr-1"></i> Derse Gelenler</button>
                                            <button onClick={() => {setNoteTitle('Dosya Takibi'); setNoteContent('- Dosyası Bende Olanlar:\n- Teslim Edilecekler:\n');}} className="text-xs bg-orange-50 text-orange-700 border border-orange-200 px-3 py-1.5 rounded-lg hover:bg-orange-100 whitespace-nowrap"><i className="fa-solid fa-folder mr-1"></i> Dosya Takibi</button>
                                        </div>

                                        <div className="space-y-4">
                                            <div><input type="text" value={noteTitle} onChange={e=>setNoteTitle(e.target.value)} placeholder="Not Başlığı..." className="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl outline-none font-bold text-gray-800 focus:bg-white focus:ring-2 focus:ring-indigo-500" /></div>
                                            <div><textarea value={noteContent} onChange={e=>setNoteContent(e.target.value)} rows="8" placeholder="Buraya yazın..." className="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl outline-none text-gray-700 resize-y focus:bg-white focus:ring-2 focus:ring-indigo-500"></textarea></div>
                                            <button onClick={saveNote} className="w-full bg-gray-900 text-white py-3 rounded-xl font-bold hover:bg-black transition shadow-md"><i className="fa-solid fa-floppy-disk mr-2"></i> Notu Kaydet</button>
                                        </div>
                                    </div>

                                    <div className="bg-white rounded-2xl shadow-sm border border-gray-200 p-6">
                                        <h3 className="text-lg font-bold text-gray-800 mb-4 border-b pb-2"><i className="fa-solid fa-list text-indigo-500 mr-2"></i>Geçmiş Notlar ({notes.length})</h3>
                                        <div className="space-y-3 overflow-y-auto max-h-[500px] pr-2">
                                            {notes.length === 0 ? <p className="text-gray-400 text-sm text-center py-4">Kayıtlı notunuz yok.</p> : 
                                                notes.map(n => (
                                                    <div key={n.id} className="bg-gray-50 p-4 rounded-xl border border-gray-100 hover:border-indigo-200 transition group relative">
                                                        <div className="flex justify-between items-start mb-2">
                                                            <h4 className="font-bold text-gray-800 text-sm">{n.title}</h4>
                                                            <button onClick={() => deleteNote(n.id)} className="text-gray-400 hover:text-red-500 opacity-0 group-hover:opacity-100 transition"><i className="fa-solid fa-trash"></i></button>
                                                        </div>
                                                        <p className="text-xs text-gray-600 line-clamp-3 mb-3 whitespace-pre-wrap">{n.content}</p>
                                                        <div className="flex justify-between items-center border-t pt-2 border-gray-200">
                                                            <span className="text-[10px] font-bold text-indigo-500 bg-indigo-50 px-2 py-1 rounded"><i className="fa-regular fa-calendar mr-1"></i> {n.date.split('-').reverse().join('.')}</span>
                                                            <button onClick={() => {setNoteTitle(n.title); setNoteContent(n.content); setNoteDate(n.date);}} className="text-[10px] text-indigo-600 hover:underline font-bold">Düzenle</button>
                                                        </div>
                                                    </div>
                                                ))
                                            }
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* --- 6. AYARLAR SEKMESİ --- */}
                        {activeTab === 'settings' && (
                            <div className="max-w-2xl mx-auto bg-white rounded-2xl shadow-sm border border-gray-200 p-6 md:p-8 animate-fade-in no-print">
                                <div className="flex items-center justify-between mb-6">
                                    <h2 className="text-2xl font-bold text-gray-800"><i className="fa-solid fa-sliders text-indigo-600 mr-3"></i>Sistem Ayarları</h2>
                                    <div className="flex items-center space-x-2 text-sm">
                                        <span className={`w-3 h-3 rounded-full ${isFbReady ? 'bg-green-500' : 'bg-red-500'}`}></span>
                                        <span className="font-medium text-gray-600">{isFbReady ? 'Veritabanı Aktif' : 'Bağlanıyor...'}</span>
                                    </div>
                                </div>
                                <div className="space-y-5">
                                    <div><label className="block text-sm font-bold text-gray-700 mb-1">Google Gemini API Key</label><input type="password" value={apiKey} onChange={(e) => setApiKey(e.target.value)} placeholder="AIzaSy..." className="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:bg-white focus:ring-2 focus:ring-indigo-500" /></div>
                                    <div>
                                        <label className="block text-sm font-bold text-gray-700 mb-1">Yapay Zeka Modeli</label><input type="text" value={modelName} onChange={(e) => setModelName(e.target.value)} className="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl outline-none font-mono text-sm focus:bg-white focus:ring-2 focus:ring-indigo-500" />
                                        <p className="text-xs text-gray-500 mt-2">Önerilenler: <button onClick={() => setModelName('gemini-2.5-flash')} className="text-indigo-600 font-bold hover:underline">gemini-2.5-flash</button> (Hızlı) | <button onClick={() => setModelName('gemini-2.5-pro')} className="text-indigo-600 font-bold hover:underline">gemini-2.5-pro</button> (Detaylı)</p>
                                    </div>
                                    <button onClick={() => {showToast("Ayarlar Kaydedildi"); setActiveTab('new_report');}} className="w-full bg-gray-900 text-white py-3 rounded-xl font-bold hover:bg-black transition shadow">Kaydet ve Kapat</button>
                                </div>
                            </div>
                        )}
                        
                    </main>

                    {/* Alt Navigasyon (Mobil) */}
                    <nav className="md:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 pb-safe z-50 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] no-print overflow-x-auto">
                        <div className="flex justify-around items-center h-14 min-w-[320px] px-2">
                            <button onClick={() => {setActiveTab('new_report'); setEditingReportId(null); setEditableResult(null);}} className={`flex flex-col items-center justify-center w-full h-full space-y-1 ${activeTab === 'new_report' ? 'text-indigo-600' : 'text-gray-400'}`}><i className="fa-solid fa-pen-nib"></i><span className="text-[9px] font-bold">Rapor</span></button>
                            <button onClick={() => setActiveTab('contacts')} className={`flex flex-col items-center justify-center w-full h-full space-y-1 ${activeTab === 'contacts' ? 'text-indigo-600' : 'text-gray-400'}`}><i className="fa-solid fa-address-book"></i><span className="text-[9px] font-bold">Rehber</span></button>
                            <button onClick={() => setActiveTab('archive')} className={`flex flex-col items-center justify-center w-full h-full space-y-1 ${activeTab === 'archive' ? 'text-indigo-600' : 'text-gray-400'}`}><i className="fa-solid fa-users-viewfinder"></i><span className="text-[9px] font-bold">Arşiv</span></button>
                            <button onClick={() => setActiveTab('tools')} className={`flex flex-col items-center justify-center w-full h-full space-y-1 ${activeTab === 'tools' ? 'text-indigo-600' : 'text-gray-400'}`}><i className="fa-solid fa-wand-magic-sparkles"></i><span className="text-[9px] font-bold">Araçlar</span></button>
                            <button onClick={() => setActiveTab('notepad')} className={`flex flex-col items-center justify-center w-full h-full space-y-1 ${activeTab === 'notepad' ? 'text-indigo-600' : 'text-gray-400'}`}><i className="fa-solid fa-book"></i><span className="text-[9px] font-bold">Notlar</span></button>
                        </div>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
